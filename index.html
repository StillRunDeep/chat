<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg:#0c0d0f; --surface:#13151a; --surface2:#1a1d24; --surface3:#21252e;
  --border:#2c3040; --border-light:#363b4a;
  --accent:#7ee787; --accent-dim:rgba(126,231,135,.1); --accent-glow:rgba(126,231,135,.2);
  --blue:#79c0ff; --yellow:#e3b341; --red:#f85149; --purple:#d2a8ff; --orange:#ffa657;
  --text:#cdd9e5; --text-dim:#768390; --text-faint:#444c56;
  --mono:'IBM Plex Mono',monospace; --sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;height:100vh;display:flex;overflow:hidden;}

/* ── Sessions ── */
#sessions-panel{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-head{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);}
.btn-new{background:var(--accent-dim);border:1px solid rgba(126,231,135,.3);border-radius:5px;color:var(--accent);font-family:var(--mono);font-size:10px;padding:4px 8px;cursor:pointer;transition:background .15s;}
.btn-new:hover{background:rgba(126,231,135,.18);}
#session-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px;}
#session-list::-webkit-scrollbar{width:3px;}
#session-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.session-item{display:flex;align-items:center;gap:6px;padding:8px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s;min-height:38px;}
.session-item:hover{background:var(--surface2);}
.session-item.active{background:var(--surface2);border-color:var(--border-light);}
.session-item.active .session-name{color:var(--text);}
.session-name{flex:1;font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.session-name-input{flex:1;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:12px;padding:2px 5px;outline:none;}
.session-meta{font-family:var(--mono);font-size:9px;color:var(--text-faint);margin-top:1px;}
.session-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .12s;}
.session-item:hover .session-actions,.session-item.active .session-actions{opacity:1;}
.sess-btn{background:none;border:none;cursor:pointer;color:var(--text-faint);padding:2px;border-radius:3px;transition:color .12s,background .12s;display:flex;align-items:center;justify-content:center;}
.sess-btn:hover{color:var(--text-dim);background:var(--surface3);}
.sess-btn.del:hover{color:var(--red);}

/* ── Right ── */
#right{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── Topbar ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:46px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-title{font-family:var(--mono);font-size:12px;color:var(--text-dim);max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-model{font-family:var(--mono);font-size:10px;color:var(--accent);opacity:.7;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.icon-btn-top{background:transparent;border:1px solid transparent;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-faint);transition:all .15s;}
.icon-btn-top:hover{color:var(--text-dim);background:var(--surface2);border-color:var(--border);}
.icon-btn-top.active{color:var(--accent);background:var(--accent-dim);border-color:rgba(126,231,135,.3);}

/* ── Config drawer ── */
#config-bar{background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;transition:max-height .25s ease;max-height:0;}
#config-bar.open{max-height:460px;}
.config-inner{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:16px 20px;}
.config-col{display:flex;flex-direction:column;gap:8px;}
.cfg-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:2px;}
input[type="text"],input[type="password"],select,textarea.sys-ta{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea.sys-ta:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim);}
select option{background:var(--surface2);}
textarea.sys-ta{resize:vertical;min-height:60px;line-height:1.5;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;}
.toggle-label{font-family:var(--mono);font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint);transition:background .2s,box-shadow .2s;}
.dot.on{background:var(--accent);box-shadow:0 0 5px var(--accent-glow);}
.toggle{position:relative;width:34px;height:18px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border:1px solid var(--border);border-radius:18px;cursor:pointer;transition:background .2s;}
.toggle-slider:before{content:'';position:absolute;width:10px;height:10px;left:3px;top:3px;background:var(--text-faint);border-radius:50%;transition:transform .2s,background .2s;}
.toggle input:checked+.toggle-slider{background:var(--accent-dim);border-color:var(--accent);}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);background:var(--accent);}

/* ── Messages ── */
#messages{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth;}
#messages::-webkit-scrollbar{width:5px;}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.msg-wrap{max-width:760px;margin:0 auto;padding:0 24px;}
.msg{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid rgba(44,48,64,.4);animation:fadeUp .18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.msg-avatar{width:26px;height:26px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);font-weight:500;margin-top:2px;}
.msg.user .msg-avatar{background:var(--surface3);color:var(--blue);border:1px solid var(--border-light);}
.msg.assistant .msg-avatar{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(126,231,135,.3);}
.msg-body{flex:1;min-width:0;}
.msg-role{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;}
.msg-content{font-size:14px;line-height:1.8;color:var(--text);}
.msg-content p{margin-bottom:10px;} .msg-content p:last-child{margin-bottom:0;}
.msg-content code{font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--yellow);}
.msg-content pre{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:10px 0;}
.msg-content pre code{background:none;border:none;padding:0;color:var(--text);font-size:12.5px;line-height:1.6;}
.msg-content h1,.msg-content h2,.msg-content h3{color:var(--text);margin:14px 0 8px;font-weight:500;}
.msg-content h1{font-size:18px;} .msg-content h2{font-size:16px;} .msg-content h3{font-size:14px;}
.msg-content ul,.msg-content ol{padding-left:20px;margin:8px 0;}
.msg-content li{margin:4px 0;}
.msg-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text-dim);margin:10px 0;}
.msg-content a{color:var(--blue);text-decoration:none;} .msg-content a:hover{text-decoration:underline;}
.msg-content table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px;}
.msg-content th,.msg-content td{border:1px solid var(--border);padding:6px 10px;}
.msg-content th{background:var(--surface2);color:var(--text-dim);font-weight:500;}
.search-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text-faint);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;margin-bottom:10px;}
.thinking{display:flex;gap:5px;align-items:center;padding:4px 0;}
.thinking span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.2s infinite;opacity:.3;}
.thinking span:nth-child(2){animation-delay:.2s;} .thinking span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.85)}40%{opacity:1;transform:scale(1)}}
.msg-error{font-family:var(--mono);font-size:12px;color:var(--red);background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:10px 12px;}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text-faint);}
#welcome p{font-family:var(--mono);font-size:12px;letter-spacing:.08em;}

/* File chips in messages */
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:8px;margin-right:6px;}
.file-chip .chip-icon{font-size:13px;}
.file-chip.img-chip img{width:240px;height:auto;max-height:200px;object-fit:contain;border-radius:4px;display:block;margin-top:6px;}

/* ── Input ── */
#input-area{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px 16px;flex-shrink:0;}
.input-inner{max-width:760px;margin:0 auto;}
#preview-area{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}

/* preview cards */
.prev-card{position:relative;display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-family:var(--mono);font-size:11px;color:var(--text-dim);max-width:200px;}
.prev-card.uploading{border-color:var(--yellow);color:var(--yellow);}
.prev-card.done{border-color:rgba(126,231,135,.35);color:var(--accent);}
.prev-card.error{border-color:rgba(248,81,73,.4);color:var(--red);}
.prev-thumb{width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.prev-info{flex:1;min-width:0;}
.prev-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;}
.prev-status{font-size:9px;margin-top:2px;opacity:.7;}
.prev-remove{position:absolute;top:-5px;right:-5px;width:15px;height:15px;background:var(--red);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;}

.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;transition:border-color .15s,box-shadow .15s;}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
#user-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;font-weight:300;resize:none;line-height:1.6;max-height:160px;overflow-y:auto;padding:2px 0;}
#user-input::placeholder{color:var(--text-faint);}
#user-input::-webkit-scrollbar{width:3px;}
#user-input::-webkit-scrollbar-thumb{background:var(--border);}
.input-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.icon-btn{background:transparent;border:1px solid transparent;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-faint);transition:all .15s;}
.icon-btn:hover{color:var(--text-dim);background:var(--surface3);border-color:var(--border);}
#send-btn{background:var(--accent-dim);border:1px solid rgba(126,231,135,.35);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);transition:background .15s,box-shadow .15s;flex-shrink:0;}
#send-btn:hover{background:rgba(126,231,135,.2);box-shadow:0 0 8px var(--accent-glow);}
#send-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}
.input-hint{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-top:7px;display:flex;justify-content:space-between;}
#file-input{display:none;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border-light);color:var(--text-dim);font-family:var(--mono);font-size:11px;padding:8px 16px;border-radius:6px;z-index:999;animation:fadeUp .2s ease;pointer-events:none;}

/* upload progress bar */
.progress-bar{height:2px;background:var(--surface3);border-radius:1px;margin-top:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--yellow);border-radius:1px;transition:width .2s;}
</style>
</head>
<body>

<!-- Sessions -->
<div id="sessions-panel">
  <div class="panel-head">
    <span class="panel-title">会话</span>
    <button class="btn-new" onclick="newSession()">+ 新建</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- Right -->
<div id="right">
  <!-- Topbar -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="topbar-title" id="topbar-title">—</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-model" id="topbar-model"></span>
      <button class="icon-btn-top" id="cfg-toggle-btn" title="设置" onclick="toggleConfig()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Config drawer -->
  <div id="config-bar">
    <div class="config-inner">
      <div class="config-col">
        <div class="cfg-label">API 配置</div>
        <input type="password" id="api-key" placeholder="API Key (AIza...)" autocomplete="off" oninput="saveSettings()"/>
        <input type="text" id="base-url" placeholder="Base URL" oninput="saveSettings()"/>
        <select id="model-select" onchange="updateModelHint();saveSettings()">
          <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
          <option value="gemini-2.5-flash-preview-04-17">gemini-2.5-flash-preview</option>
          <option value="gemini-2.5-pro-preview-03-25">gemini-2.5-pro-preview</option>
          <option value="gemini-1.5-pro">gemini-1.5-pro</option>
          <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        </select>
        <input type="text" id="custom-model" placeholder="自定义模型名（覆盖上方）" oninput="updateModelHint();saveSettings()"/>
      </div>
      <div class="config-col">
        <div class="cfg-label">功能开关</div>
        <div class="toggle-row">
          <div class="toggle-label"><div class="dot" id="dot-search"></div>联网搜索 Grounding</div>
          <label class="toggle"><input type="checkbox" id="toggle-search" onchange="syncDot('search');saveSettings()"/><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div class="toggle-label"><div class="dot" id="dot-stream"></div>流式输出 Stream</div>
          <label class="toggle"><input type="checkbox" id="toggle-stream" checked onchange="syncDot('stream');saveSettings()"/><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div class="toggle-label"><div class="dot" id="dot-inline"></div>小图片内嵌 (&lt;1MB)</div>
          <label class="toggle"><input type="checkbox" id="toggle-inline" checked onchange="syncDot('inline');saveSettings()"/><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div class="config-col">
        <div class="cfg-label">System Prompt</div>
        <textarea class="sys-ta" id="system-prompt" placeholder="你是一个有帮助的助手..." oninput="saveSettings()"></textarea>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div id="welcome">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="16" stroke="#7ee787" stroke-width="1.2" stroke-dasharray="4 3"/>
        <path d="M12 20h16M20 12v16" stroke="#7ee787" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <p>点击右上角 ⚙ 填写 API Key，然后开始对话</p>
    </div>
    <div class="msg-wrap" id="msg-container" style="display:none"></div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-inner">
      <div id="preview-area"></div>
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="输入消息… (Enter 发送 · Shift+Enter 换行)"></textarea>
        <div class="input-actions">
          <button class="icon-btn" title="上传文件" onclick="document.getElementById('file-input').click()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M8 2v8M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <input type="file" id="file-input" multiple
            accept="image/*,application/pdf,text/plain,text/csv,text/markdown,.md,.csv,audio/*,video/*"
            onchange="handleFiles(this.files)"/>
          <button id="send-btn" onclick="sendMessage()" title="发送">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
              <path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">
        <span id="model-hint" style="color:var(--accent);opacity:.7"></span>
        <span>Enter 发送 · Shift+Enter 换行</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const SK_SETTINGS = 'geminichat_settings';
const SK_SESSIONS = 'geminichat_sessions';
const SK_ACTIVE   = 'geminichat_active';
const INLINE_LIMIT = 1 * 1024 * 1024; // 1MB

// ── State ──
let sessions = {};
let activeId  = null;
let pendingFiles = []; // [{id, name, mimeType, size, status, fileUri, base64, dataUrl, isInline}]
let isGenerating = false;

// ── Utils ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtSize(b) { return b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(0)+'KB' : (b/1048576).toFixed(1)+'MB'; }
function fmtDate(ts) {
  const d = new Date(ts), now = new Date();
  return d.toDateString()===now.toDateString() ? d.toTimeString().slice(0,5) : `${d.getMonth()+1}/${d.getDate()}`;
}

function fileIcon(mime) {
  if (mime.startsWith('image/')) return '🖼';
  if (mime === 'application/pdf') return '📄';
  if (mime.startsWith('text/') || mime.includes('csv') || mime.includes('markdown')) return '📝';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.startsWith('video/')) return '🎬';
  return '📎';
}

// ── Settings ──
function saveSettings() {
  const s = {
    apiKey: document.getElementById('api-key').value,
    baseUrl: document.getElementById('base-url').value,
    model: document.getElementById('model-select').value,
    customModel: document.getElementById('custom-model').value,
    useSearch: document.getElementById('toggle-search').checked,
    useStream: document.getElementById('toggle-stream').checked,
    useInline: document.getElementById('toggle-inline').checked,
    sysPrompt: document.getElementById('system-prompt').value,
  };
  try { localStorage.setItem(SK_SETTINGS, JSON.stringify(s)); } catch(e){}
  updateModelHint();
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SK_SETTINGS)||'{}');
    if (s.apiKey)    document.getElementById('api-key').value = s.apiKey;
    document.getElementById('base-url').value = s.baseUrl || 'https://generativelanguage.googleapis.com';
    if (s.model)     document.getElementById('model-select').value = s.model;
    if (s.customModel) document.getElementById('custom-model').value = s.customModel;
    document.getElementById('toggle-search').checked = !!s.useSearch;
    document.getElementById('toggle-stream').checked = s.useStream !== false;
    document.getElementById('toggle-inline').checked = s.useInline !== false;
    if (s.sysPrompt) document.getElementById('system-prompt').value = s.sysPrompt;
  } catch(e) {
    document.getElementById('base-url').value = 'https://generativelanguage.googleapis.com';
    document.getElementById('toggle-stream').checked = true;
    document.getElementById('toggle-inline').checked = true;
  }
  syncDot('search'); syncDot('stream'); syncDot('inline'); updateModelHint();
}

function syncDot(k) {
  document.getElementById('dot-'+k).classList.toggle('on', document.getElementById('toggle-'+k).checked);
}
function updateModelHint() {
  const m = document.getElementById('custom-model').value.trim() || document.getElementById('model-select').value;
  document.getElementById('model-hint').textContent = m;
  document.getElementById('topbar-model').textContent = m;
}
function getConfig() {
  return {
    apiKey:    document.getElementById('api-key').value.trim(),
    baseUrl:   (document.getElementById('base-url').value.trim()||'https://generativelanguage.googleapis.com').replace(/\/$/,''),
    model:     document.getElementById('custom-model').value.trim()||document.getElementById('model-select').value,
    useSearch: document.getElementById('toggle-search').checked,
    useStream: document.getElementById('toggle-stream').checked,
    useInline: document.getElementById('toggle-inline').checked,
    sysPrompt: document.getElementById('system-prompt').value.trim(),
  };
}
function toggleConfig() {
  const bar = document.getElementById('config-bar');
  const btn = document.getElementById('cfg-toggle-btn');
  bar.classList.toggle('open');
  btn.classList.toggle('active', bar.classList.contains('open'));
}

// ── Sessions ──
function saveSessions() { try { localStorage.setItem(SK_SESSIONS, JSON.stringify(sessions)); } catch(e){} }
function saveActive()   { try { localStorage.setItem(SK_ACTIVE, activeId); } catch(e){} }

function newSession() {
  const id = uid();
  sessions[id] = { id, title:'新对话', createdAt:Date.now(), messages:[] };
  saveSessions();
  switchSession(id);
  renderSessionList();
}

function switchSession(id) {
  activeId = id; saveActive();
  renderSessionList(); renderMessages();
  document.getElementById('topbar-title').textContent = sessions[id]?.title||'—';
}

function deleteSession(id) {
  if (Object.keys(sessions).length <= 1) { toast('至少保留一个会话'); return; }
  delete sessions[id]; saveSessions();
  if (activeId === id) {
    const rem = Object.keys(sessions);
    activeId = rem[rem.length-1]; saveActive();
  }
  renderSessionList(); renderMessages();
  document.getElementById('topbar-title').textContent = sessions[activeId]?.title||'—';
}

function startRename(id) {
  const item = document.querySelector(`.session-item[data-id="${id}"]`);
  if (!item) return;
  const nameEl = item.querySelector('.session-name');
  const old = sessions[id].title;
  const input = document.createElement('input');
  input.className = 'session-name-input'; input.value = old;
  nameEl.replaceWith(input); input.focus(); input.select();
  function commit() {
    const v = input.value.trim()||old;
    sessions[id].title = v; saveSessions(); renderSessionList();
    if (id===activeId) document.getElementById('topbar-title').textContent = v;
  }
  input.onblur = commit;
  input.onkeydown = e => {
    if (e.key==='Enter'){e.preventDefault();input.blur();}
    if (e.key==='Escape'){input.value=old;input.blur();}
  };
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  Object.values(sessions).sort((a,b)=>b.createdAt-a.createdAt).forEach(s => {
    const item = document.createElement('div');
    item.className = 'session-item'+(s.id===activeId?' active':'');
    item.dataset.id = s.id;
    item.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="session-name">${escHtml(s.title)}</div>
        <div class="session-meta">${s.messages.length}条 · ${fmtDate(s.createdAt)}</div>
      </div>
      <div class="session-actions">
        <button class="sess-btn" title="重命名" onclick="event.stopPropagation();startRename('${s.id}')">
          <svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        </button>
        <button class="sess-btn del" title="删除" onclick="event.stopPropagation();deleteSession('${s.id}')">
          <svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;
    item.onclick = () => switchSession(s.id);
    list.appendChild(item);
  });
}

// ── Render messages ──
function renderMessages() {
  const container = document.getElementById('msg-container');
  const welcome   = document.getElementById('welcome');
  container.innerHTML = '';
  const sess = sessions[activeId];
  if (!sess || !sess.messages.length) {
    container.style.display = 'none'; welcome.style.display = 'flex'; return;
  }
  welcome.style.display = 'none'; container.style.display = 'block';
  sess.messages.forEach(m => container.appendChild(buildMsgEl(m)));
  scrollBot();
}

function buildMsgEl(m) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${m.role}`;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = m.role==='user'?'U':'G';
  wrap.appendChild(av);
  const body = document.createElement('div');
  body.className = 'msg-body';
  const rl = document.createElement('div');
  rl.className = 'msg-role';
  rl.textContent = m.role==='user'?'You':'Gemini';
  body.appendChild(rl);

  // file attachments display
  if (m.attachments && m.attachments.length) {
    m.attachments.forEach(a => {
      const chip = document.createElement('div');
      if (a.type==='image' && a.dataUrl) {
        chip.className = 'file-chip img-chip';
        chip.innerHTML = `<span class="chip-icon">${fileIcon(a.mimeType)}</span><span>${escHtml(a.name)}</span><img src="${a.dataUrl}" style="display:block;max-width:260px;border-radius:4px;margin-top:6px;">`;
      } else {
        chip.className = 'file-chip';
        chip.innerHTML = `<span class="chip-icon">${fileIcon(a.mimeType)}</span><span>${escHtml(a.name)}</span><span style="color:var(--text-faint);margin-left:4px">${fmtSize(a.size)}</span>`;
      }
      body.appendChild(chip);
    });
  }

  if (m.usedSearch) {
    const b = document.createElement('div');
    b.className = 'search-badge';
    b.innerHTML = `<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>已联网搜索`;
    body.appendChild(b);
  }
  const ct = document.createElement('div');
  ct.className = 'msg-content';
  ct.innerHTML = m.html||'';
  body.appendChild(ct);
  wrap.appendChild(body);
  return wrap;
}

function appendLiveMsg() {
  document.getElementById('welcome').style.display = 'none';
  const container = document.getElementById('msg-container');
  container.style.display = 'block';
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant'; wrap.id = 'live-msg';
  const av = document.createElement('div');
  av.className = 'msg-avatar'; av.textContent = 'G';
  wrap.appendChild(av);
  const body = document.createElement('div');
  body.className = 'msg-body';
  const rl = document.createElement('div');
  rl.className = 'msg-role'; rl.textContent = 'Gemini';
  body.appendChild(rl);
  const ct = document.createElement('div');
  ct.className = 'msg-content';
  ct.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  body.appendChild(ct);
  wrap.appendChild(body);
  container.appendChild(wrap);
  scrollBot();
  return {wrap, body, ct};
}

function scrollBot() { const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; }
function toast(msg, dur=2200) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), dur);
}

// ── File upload via File API ──
async function uploadViaFileAPI(file, cfg, cardEl) {
  // Step 1: initiate resumable upload
  const initUrl = `${cfg.baseUrl}/upload/v1beta/files?key=${cfg.apiKey}`;
  const initRes = await fetch(initUrl, {
    method:'POST',
    headers:{
      'X-Goog-Upload-Protocol':'resumable',
      'X-Goog-Upload-Command':'start',
      'X-Goog-Upload-Header-Content-Length': file.size,
      'X-Goog-Upload-Header-Content-Type': file.type,
      'Content-Type':'application/json',
    },
    body: JSON.stringify({ file: { display_name: file.name } }),
  });
  if (!initRes.ok) {
    const e = await initRes.json().catch(()=>({}));
    throw new Error(e?.error?.message||`Upload init failed: HTTP ${initRes.status}`);
  }
  const uploadUrl = initRes.headers.get('X-Goog-Upload-URL');
  if (!uploadUrl) throw new Error('No upload URL returned from File API');

  // Step 2: upload the bytes
  setCardStatus(cardEl, 'uploading', '上传中…');
  const uploadRes = await fetch(uploadUrl, {
    method:'POST',
    headers:{
      'Content-Length': file.size,
      'X-Goog-Upload-Offset': 0,
      'X-Goog-Upload-Command':'upload, finalize',
    },
    body: file,
  });
  if (!uploadRes.ok) {
    const e = await uploadRes.json().catch(()=>({}));
    throw new Error(e?.error?.message||`Upload failed: HTTP ${uploadRes.status}`);
  }
  const data = await uploadRes.json();
  const fileUri = data?.file?.uri;
  if (!fileUri) throw new Error('No file URI in upload response');

  // Step 3: poll until state=ACTIVE
  const fileId = data.file.name; // e.g. "files/xxxx"
  setCardStatus(cardEl, 'uploading', '处理中…');
  for (let i=0; i<30; i++) {
    await new Promise(r=>setTimeout(r,1500));
    const pollRes = await fetch(`${cfg.baseUrl}/v1beta/${fileId}?key=${cfg.apiKey}`);
    if (!pollRes.ok) break;
    const info = await pollRes.json();
    if (info.state === 'ACTIVE') { setCardStatus(cardEl,'done','就绪'); return fileUri; }
    if (info.state === 'FAILED') throw new Error('File processing failed on server');
  }
  // If still not active after polling, return URI anyway (some files skip processing)
  return fileUri;
}

function setCardStatus(cardEl, status, text) {
  if (!cardEl) return;
  cardEl.className = `prev-card ${status}`;
  const statusEl = cardEl.querySelector('.prev-status');
  if (statusEl) statusEl.textContent = text;
}

// ── Handle file selection ──
async function handleFiles(files) {
  const cfg = getConfig();
  if (!cfg.apiKey) { toggleConfig(); toast('请先填写 API Key 再上传文件'); return; }

  for (const file of [...files]) {
    const id = uid();
    const isImage = file.type.startsWith('image/');
    const useInline = isImage && cfg.useInline && file.size < INLINE_LIMIT;

    const pf = { id, name:file.name, mimeType:file.type, size:file.size, status:'pending', fileUri:null, base64:null, dataUrl:null, isInline:useInline };
    pendingFiles.push(pf);

    // Build preview card
    const card = document.createElement('div');
    card.className = 'prev-card uploading';
    card.id = 'card-'+id;
    if (isImage) {
      card.innerHTML = `
        <img class="prev-thumb" src="" alt="">
        <div class="prev-info">
          <div class="prev-name">${escHtml(file.name)}</div>
          <div class="prev-status">${useInline?'读取中…':'上传中…'}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:10%"></div></div>
        </div>
        <button class="prev-remove" onclick="removePending('${id}')">✕</button>`;
    } else {
      card.innerHTML = `
        <div style="font-size:18px;flex-shrink:0">${fileIcon(file.type)}</div>
        <div class="prev-info">
          <div class="prev-name">${escHtml(file.name)}</div>
          <div class="prev-status">${useInline?'读取中…':'上传中…'} · ${fmtSize(file.size)}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:10%"></div></div>
        </div>
        <button class="prev-remove" onclick="removePending('${id}')">✕</button>`;
    }
    document.getElementById('preview-area').appendChild(card);

    // Process file
    (async () => {
      try {
        if (useInline) {
          // Read as base64
          const base64 = await readFileBase64(file);
          const dataUrl = `data:${file.type};base64,${base64}`;
          pf.base64 = base64; pf.dataUrl = dataUrl; pf.status = 'done';
          if (isImage) { const thumb = card.querySelector('.prev-thumb'); if(thumb) thumb.src = dataUrl; }
          setCardStatus(card, 'done', '就绪（内嵌）');
          card.querySelector('.progress-fill').style.width = '100%';
        } else {
          // Upload via File API
          card.querySelector('.progress-fill').style.width = '40%';
          const uri = await uploadViaFileAPI(file, cfg, card);
          pf.fileUri = uri; pf.status = 'done';
          if (isImage) {
            const base64 = await readFileBase64(file);
            pf.dataUrl = `data:${file.type};base64,${base64}`;
            const thumb = card.querySelector('.prev-thumb'); if(thumb) thumb.src = pf.dataUrl;
          }
          card.querySelector('.progress-fill').style.width = '100%';
        }
      } catch(err) {
        pf.status = 'error'; pf.error = err.message;
        setCardStatus(card, 'error', '失败: '+err.message.slice(0,30));
        toast('文件上传失败: '+err.message, 3500);
      }
    })();
  }
  document.getElementById('file-input').value = '';
}

function readFileBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

function removePending(id) {
  pendingFiles = pendingFiles.filter(f=>f.id!==id);
  document.getElementById('card-'+id)?.remove();
}

// ── Textarea ──
const ta = document.getElementById('user-input');
ta.addEventListener('input', ()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,160)+'px';});
ta.addEventListener('keydown', e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

// ── Send ──
async function sendMessage() {
  if (isGenerating) return;
  const cfg = getConfig();
  if (!cfg.apiKey) { toggleConfig(); toast('请先填写 API Key'); return; }
  const text = ta.value.trim();
  if (!text && !pendingFiles.length) return;

  // Check if any files still uploading
  const uploading = pendingFiles.filter(f=>f.status==='pending'||f.status==='uploading');
  if (uploading.length) { toast('文件仍在上传中，请稍候…'); return; }
  const errFiles = pendingFiles.filter(f=>f.status==='error');
  if (errFiles.length) { toast('有文件上传失败，请移除后重试'); return; }

  const sess = sessions[activeId];
  if (!sess) return;

  // Auto-title
  if (!sess.messages.length && text) {
    sess.title = text.slice(0,28)+(text.length>28?'…':'');
    document.getElementById('topbar-title').textContent = sess.title;
  }

  // Build parts
  const parts = [];
  const attachments = []; // for display only
  const snapFiles = [...pendingFiles];

  for (const f of snapFiles) {
    if (f.isInline && f.base64) {
      parts.push({ inlineData:{ mimeType:f.mimeType, data:f.base64 } });
      if (f.mimeType.startsWith('image/')) attachments.push({type:'image', name:f.name, mimeType:f.mimeType, size:f.size, dataUrl:f.dataUrl});
      else attachments.push({type:'file', name:f.name, mimeType:f.mimeType, size:f.size});
    } else if (f.fileUri) {
      parts.push({ fileData:{ mimeType:f.mimeType, fileUri:f.fileUri } });
      if (f.mimeType.startsWith('image/') && f.dataUrl) attachments.push({type:'image', name:f.name, mimeType:f.mimeType, size:f.size, dataUrl:f.dataUrl});
      else attachments.push({type:'file', name:f.name, mimeType:f.mimeType, size:f.size});
    }
  }
  if (text) parts.push({ text });

  // Save + render user message
  const userHtml = text ? marked.parse(text) : '';
  sess.messages.push({ role:'user', parts, html:userHtml, attachments });
  document.getElementById('welcome').style.display = 'none';
  const container = document.getElementById('msg-container');
  container.style.display = 'block';
  container.appendChild(buildMsgEl({ role:'user', html:userHtml, attachments }));

  ta.value = ''; ta.style.height = 'auto';
  pendingFiles = [];
  document.getElementById('preview-area').innerHTML = '';

  isGenerating = true;
  document.getElementById('send-btn').disabled = true;

  const apiHistory = sess.messages.map(m => ({ role: m.role==='assistant'?'model':m.role, parts: m.parts }));
  const {wrap:liveWrap, body:liveBody, ct:liveCt} = appendLiveMsg();

  try {
    const reqBody = { contents: apiHistory };
    if (cfg.sysPrompt) reqBody.systemInstruction = { parts:[{text:cfg.sysPrompt}] };
    if (cfg.useSearch) reqBody.tools = [{ googleSearch:{} }];

    const endpoint = cfg.useStream
      ? `${cfg.baseUrl}/v1beta/models/${cfg.model}:streamGenerateContent?alt=sse&key=${cfg.apiKey}`
      : `${cfg.baseUrl}/v1beta/models/${cfg.model}:generateContent?key=${cfg.apiKey}`;

    const res = await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(reqBody),
    });

    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e?.error?.message||`HTTP ${res.status}`);
    }

    let fullText = '';
    let usedSearch = false;

    if (cfg.useStream) {
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      liveCt.innerHTML = '';
      while (true) {
        const {done,value} = await reader.read();
        if (done) break;
        buf += dec.decode(value,{stream:true});
        const lines = buf.split('\n'); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw==='[DONE]') continue;
          try {
            const chunk = JSON.parse(raw);
            const part = chunk.candidates?.[0]?.content?.parts?.[0];
            if (part?.text) { fullText+=part.text; liveCt.innerHTML=marked.parse(fullText); scrollBot(); }
            if (chunk.candidates?.[0]?.groundingMetadata?.webSearchQueries?.length) usedSearch=true;
          } catch {}
        }
      }
      if (usedSearch) {
        const b=document.createElement('div'); b.className='search-badge';
        b.innerHTML=`<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>已联网搜索`;
        liveBody.insertBefore(b,liveCt);
      }
    } else {
      const data = await res.json();
      const cand = data.candidates?.[0];
      fullText = cand?.content?.parts?.map(p=>p.text||'').join('')||'';
      if (cand?.groundingMetadata?.webSearchQueries?.length) usedSearch=true;
      liveWrap.remove();
      container.appendChild(buildMsgEl({role:'assistant', html:marked.parse(fullText), usedSearch}));
      scrollBot();
    }

    liveWrap.removeAttribute('id');
    const aMsg = {role:'assistant', parts:[{text:fullText}], html:marked.parse(fullText), usedSearch};
    sess.messages.push(aMsg);
    saveSessions(); renderSessionList();

  } catch(err) {
    liveWrap.remove();
    const w=document.createElement('div'); w.className='msg assistant';
    w.innerHTML=`<div class="msg-avatar">G</div><div class="msg-body"><div class="msg-role">Gemini</div><div class="msg-error">⚠ ${escHtml(err.message)}</div></div>`;
    container.appendChild(w); scrollBot();
    sess.messages.pop(); saveSessions();
  } finally {
    isGenerating=false;
    document.getElementById('send-btn').disabled=false;
  }
}

// ── Init ──
function init() {
  loadSettings();
  try { sessions = JSON.parse(localStorage.getItem(SK_SESSIONS)||'{}'); } catch(e){ sessions={}; }
  if (!Object.keys(sessions).length) {
    const id=uid(); sessions[id]={id,title:'新对话',createdAt:Date.now(),messages:[]};
  }
  const saved = localStorage.getItem(SK_ACTIVE);
  activeId = (saved && sessions[saved]) ? saved : Object.keys(sessions)[0];
  saveSessions(); saveActive();
  renderSessionList(); renderMessages();
  document.getElementById('topbar-title').textContent = sessions[activeId]?.title||'—';
}
init();
</script>
